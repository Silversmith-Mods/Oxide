
modLoader="javafml"

loaderVersion="[4,)"

license="LGPLv3"

[[mods]]
    modId="${mod_id}"
    version = "${mod_version}"
    displayName="${mod_name}"
    logoFile="icon.png"
    credits="Ordana"
    authors="Ordana, Keyberries"
    itemIcon="oxide:template"
    description='''${mod_description}'''

[[dependencies.oxide]]
    modId="neoforge"
    type = "required"
