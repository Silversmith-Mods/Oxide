    ordering="NONE"
    side="BOTH"

[[dependencies.oxide]]
    modId="minecraft"
    type = "required"
    versionRange="[1.21.1]"
    ordering="NONE"
    side="BOTH"

[[dependencies.oxide]]
    modId="moonlight"
    type = "required"
    referralUrl = "https://www.curseforge.com/minecraft/mc-mods/selene"
    versionRange="[1.21-2.17.34,]"
    ordering="NONE"
    side="BOTH"
